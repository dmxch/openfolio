[alembic]
script_location = alembic
sqlalchemy.url = driver://user:pass@localhost/dbname

# Migration file naming: Manuell nummeriert (039_, 040_, ...).
# Alembic bietet kein Auto-Increment für numerische Prefixe.
# Dateiname MUSS mit nächster freier Nummer beginnen:
#   alembic revision --autogenerate -m "039_description"
# file_template bleibt auf Alembic-Default (%%(rev)s_%%(slug)s).
# Nach Generierung: Datei manuell umbenennen zu NNN_description.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
